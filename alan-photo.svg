<svg width="560" height="680" viewBox="0 0 560 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1230"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <linearGradient id="figGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B2C5E"/>
      <stop offset="100%" stop-color="#120C1E"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <rect width="560" height="680" fill="url(#bgGrad)"/>
  <circle cx="290" cy="230" r="260" fill="url(#glow)"/>
  <!-- grid -->
  <g stroke="#8B5CF6" stroke-opacity="0.08">
    <line x1="0" y1="120" x2="560" y2="120"/>
    <line x1="0" y1="240" x2="560" y2="240"/>
    <line x1="0" y1="360" x2="560" y2="360"/>
    <line x1="0" y1="480" x2="560" y2="480"/>
    <line x1="140" y1="0" x2="140" y2="680"/>
    <line x1="280" y1="0" x2="280" y2="680"/>
    <line x1="420" y1="0" x2="420" y2="680"/>
  </g>
  <!-- shoulders/torso -->
  <path d="M60,680 C60,480 150,400 280,400 C410,400 500,480 500,680 Z" fill="url(#figGrad)"/>
  <path d="M60,680 C60,480 150,400 280,400 C410,400 500,480 500,680" fill="none" stroke="url(#rim)" stroke-width="2" stroke-opacity="0.6"/>
  <!-- neck -->
  <rect x="250" y="330" width="60" height="90" rx="20" fill="#241a3d"/>
  <!-- head -->
  <ellipse cx="280" cy="255" rx="95" ry="110" fill="#2a1f47"/>
  <ellipse cx="280" cy="255" rx="95" ry="110" fill="none" stroke="url(#rim)" stroke-width="2" stroke-opacity="0.5"/>
  <!-- headset -->
  <path d="M185,240 C185,160 230,110 280,110 C330,110 375,160 375,240" fill="none" stroke="#8B5CF6" stroke-width="10" stroke-linecap="round"/>
  <rect x="170" y="230" width="30" height="55" rx="12" fill="#3B82F6"/>
  <rect x="360" y="230" width="30" height="55" rx="12" fill="#3B82F6"/>
  <rect x="270" y="100" width="20" height="24" rx="6" fill="#8B5CF6"/>
  <!-- visor line -->
  <rect x="205" y="235" width="150" height="14" rx="7" fill="#0F0F0F"/>
  <rect x="205" y="235" width="150" height="14" rx="7" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
  <circle cx="240" cy="242" r="3" fill="#8B5CF6"/>
  <circle cx="320" cy="242" r="3" fill="#8B5CF6"/>
</svg>
